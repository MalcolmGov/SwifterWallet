<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e0b4a"/>
      <stop offset="60%" stop-color="#140d30"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#7c3aed" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle radial glow center -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#glow)"/>

  <!-- Border glow ring -->
  <rect width="512" height="512" rx="112" ry="112" fill="none"
        stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>

  <!-- Stylised "S" glyph -->
  <!--
    Hand-crafted S path centred at (256, 256).
    Drawn as two arcs (top bowl + bottom bowl) typical of a rounded S.
  -->
  <path filter="url(#shadow)"
    d="
      M 315 160
      C 315 160 290 140 256 140
      C 207 140 172 170 172 210
      C 172 248 200 268 240 278
      L 272 287
      C 310 297 340 318 340 360
      C 340 402 305 372 256 372
      C 220 372 190 355 180 340
    "
    stroke="url(#glyph)"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>

  <!-- Second segment of S (the lower bowl) -->
  <path filter="url(#shadow)"
    d="
      M 197 352
      C 197 352 222 372 256 372
      C 305 372 340 342 340 302
      C 340 264 312 244 272 234
      L 240 225
      C 202 215 172 194 172 152
      C 172 110 207 140 256 140
      C 292 140 322 157 332 172
    "
    stroke="url(#glyph)"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"/>
</svg>
